name: Publish to swamp registry

# Publishes the extension to the swamp registry when a version tag is pushed.
#
# Before tagging:
#   1. Bump `version:` in manifest.yaml (and the `version` field in
#      extensions/models/igor.ts to match). Use:
#        swamp extension version --manifest manifest.yaml --json
#   2. Commit, then tag and push, e.g.:
#        git tag v2026.05.28.1 && git push origin v2026.05.28.1
#
# Required repository secret:
#   SWAMP_API_KEY — a personal API key from your swamp.club account settings.
#                   The swamp CLI reads it for headless (non-interactive) auth.

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install swamp
        run: curl -fsSL https://swamp.club/install.sh | sh

      - name: Add swamp to PATH
        run: echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Verify authentication
        env:
          SWAMP_API_KEY: ${{ secrets.SWAMP_API_KEY }}
        run: swamp auth whoami --json

      - name: Push extension to registry
        env:
          SWAMP_API_KEY: ${{ secrets.SWAMP_API_KEY }}
        run: swamp extension push manifest.yaml --yes --json
