name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format check
        run: deno fmt --check extensions/

      - name: Lint
        run: deno lint extensions/

      - name: Type check
        run: deno check extensions/**/*.ts

      - name: Test
        run: deno test extensions/
