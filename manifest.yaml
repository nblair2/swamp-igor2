manifestVersion: 1
name: "@nblair2/igor2"
version: "2026.05.30.1"
description: >
  Full igor2 cluster-manager control via the REST API, split into five models:
  reservations (the reservation lifecycle), hosts (power, inventory,
  administration, host policies), boot (distros, profiles, images, kickstarts),
  identity (users, groups, privilege elevation), and server (clusters/MOTD,
  sync, stats, config, auth-reset, dashboard).
repository: "https://github.com/nblair2/swamp-igor2"
labels:
  - igor2
  - cluster
  - reservation
  - sandia
  - hpc
  - infrastructure
  - distro
  - profile
  - kickstart
  - users
  - groups
  - admin
models:
  - reservations.ts
  - hosts.ts
  - boot.ts
  - identity.ts
  - server.ts
additionalFiles:
  - LICENSE.txt
  - README.md
platforms: []
